name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Public Google Apps Script endpoint (already exposed in the client bundle).
          # Override by adding a repo Variable: Settings → Secrets and variables → Actions → Variables.
          VITE_WAITLIST_URL: ${{ vars.VITE_WAITLIST_URL || 'https://script.google.com/macros/s/AKfycbwtFVBoj4TV1AW30_k_pWjkXelpTpuP6YASksTpPaNwm3UYHBG7T4wm4dV15LfO34Hr/exec' }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
