<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" role="img" aria-label="Mana Visa debit card, front">
  <title>Mana debit card — front</title>
  <desc>Front of the Mana Visa debit card. Deep navy body with a subtle woven texture, the Mana twin-sails mark and wordmark in white and coral, EMV chip, contactless symbol, cardholder name, DEBIT label, and Visa mark.</desc>
  <defs>
    <clipPath id="cc-front"><rect x="0" y="0" width="856" height="540" rx="36"></rect></clipPath>
    <linearGradient id="cardgrad-f" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1228"></stop>
      <stop offset="0.55" stop-color="#101d3f"></stop>
      <stop offset="1" stop-color="#1a2a52"></stop>
    </linearGradient>
    <radialGradient id="glow-f" cx="0.82" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#E85D2C" stop-opacity="0.32"></stop>
      <stop offset="1" stop-color="#E85D2C" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="chip-f" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E6C36A"></stop>
      <stop offset="1" stop-color="#B68C3A"></stop>
    </linearGradient>
  </defs>
  <g clip-path="url(#cc-front)">
